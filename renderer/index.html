<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>VAD-Cut 课程视频剪辑</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-frame">
  <!-- 标题栏 -->
  <header class="titlebar">
    <div class="titlebar-logo">
      <!-- 精美剪刀图标 -->
      <svg width="24" height="24" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 下刀刃 -->
        <line x1="31" y1="72" x2="85" y2="36" stroke="currentColor" stroke-width="7" stroke-linecap="round" opacity=".7"/>
        <!-- 上刀刃 -->
        <line x1="31" y1="28" x2="85" y2="64" stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
        <!-- 轴心 -->
        <circle cx="52" cy="50" r="6" fill="currentColor" opacity=".6"/>
        <!-- 上圆环 -->
        <circle cx="20" cy="28" r="11" fill="var(--bg-card,#1a1a2e)" stroke="currentColor" stroke-width="6"/>
        <circle cx="20" cy="28" r="4"  fill="var(--bg,#0f0f1a)"/>
        <!-- 下圆环 -->
        <circle cx="20" cy="72" r="11" fill="var(--bg-card,#1a1a2e)" stroke="currentColor" stroke-width="6"/>
        <circle cx="20" cy="72" r="4"  fill="var(--bg,#0f0f1a)"/>
      </svg>
    </div>
    <span class="titlebar-title">VAD-Cut &nbsp;<small>课程视频掐头去尾</small></span>
    <div class="window-controls">
      <!-- 主题切换（单击直接切换深色/浅色） -->
      <button class="wc-btn" id="btn-theme" title="切换主题">
        <svg id="icon-theme-dark" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg id="icon-theme-light" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="wc-btn wc-min" id="btn-win-min" title="最小化">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0" y="4.5" width="10" height="1" fill="currentColor"/></svg>
      </button>
      <button class="wc-btn wc-max" id="btn-win-max" title="最大化">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button class="wc-btn wc-close" id="btn-win-close" title="关闭">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/>
          <line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <!-- 拖拽 / 选择文件夹区域 -->
    <section id="dropzone" class="dropzone" role="button" tabindex="0"
             aria-label="拖拽文件夹到此处或点击选择">
      <div class="dropzone-inner">
        <svg class="drop-icon" width="56" height="56" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          <line x1="12" y1="11" x2="12" y2="17"/>
          <polyline points="9 14 12 11 15 14"/>
        </svg>
        <p class="drop-hint">点击选择视频文件夹</p>
        <p class="drop-sub">选择后自动开始扫描</p>
      </div>
    </section>

    <!-- 已选文件夹信息 + 操作按钮 -->
    <section id="toolbar" class="toolbar hidden">
      <div class="folder-info">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <span id="folder-path" class="folder-path"></span>
        <button id="btn-change" class="btn btn-ghost btn-sm" title="更换文件夹">更换</button>
      </div>
      <div class="toolbar-actions">
        <label class="checkbox-label" title="使用 SenseVoice 生成字幕（会延长处理时间）">
          <input type="checkbox" id="chk-asr">
          生成字幕
        </label>
        <button id="btn-start" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          开始剪辑
        </button>
        <button id="btn-cancel" class="btn btn-danger hidden">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          取消
        </button>
        <button id="btn-open-output" class="btn btn-ghost hidden">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          打开输出目录
        </button>
      </div>
    </section>

    <!-- 整体进度 -->
    <section id="overall-progress" class="overall-progress hidden">
      <div class="progress-header">
        <span id="progress-label">处理中...</span>
        <span id="progress-count"></span>
      </div>
      <div class="progress-track">
        <div id="progress-bar" class="progress-bar" style="width:0%"></div>
      </div>
    </section>

    <!-- 文件列表 -->
    <section id="file-list-section" class="file-list-section hidden">
      <div id="file-list" class="file-list"></div>
    </section>

    <!-- 日志面板 -->
    <section id="log-section" class="log-section hidden">
      <div class="log-header">
        <span>运行日志</span>
        <button id="btn-clear-log" class="btn btn-ghost btn-sm">清空</button>
      </div>
      <div id="log-panel" class="log-panel"></div>
    </section>
  </main>
  </div><!-- #app-frame -->

  <script src="app.js"></script>
</body>
</html>
